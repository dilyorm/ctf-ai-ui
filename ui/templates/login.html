<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · CTF Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-brand">
      <span class="auth-brand-icon">⚡</span>
      <span class="auth-brand-name">CTF Agent</span>
      <span class="auth-brand-tagline">Multi-Model Solver Swarm</span>
    </div>

    <div class="auth-card">
      <h2 class="auth-title">Sign in</h2>

      {% if error %}
        <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
        <button class="btn btn-primary btn-full" type="submit">Sign in</button>
      </form>

      {% if github_login_enabled %}
      <div class="auth-divider"><span>or</span></div>
      <a class="btn btn-github btn-full" href="/auth/github">
        <svg viewBox="0 0 16 16" fill="currentColor" width="16" height="16">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        Continue with GitHub
      </a>
      {% endif %}

      <p class="auth-footer">No account? <a href="/register">Create one</a></p>
    </div>
  </div>
</body>
</html>
